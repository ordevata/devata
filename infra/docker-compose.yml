version: '3.9'

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: ./api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://devata:devata@db:5432/devata
      - REDIS_URL=redis://redis:6379
    expose:
      - '3000'
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=devata
      - POSTGRES_PASSWORD=devata
      - POSTGRES_DB=devata
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devata -d devata']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  pg_data:
